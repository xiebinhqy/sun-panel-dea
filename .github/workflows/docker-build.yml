name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version info
        id: version
        run: |
          # 读取 service/assets/version 中的版本号
          VERSION=$(cut -d'|' -f2 ./service/assets/version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version: $VERSION"

      - name: Build and push Docker image (latest)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            deattorsss/sun-panel-dea:latest
            deattorsss/sun-panel-dea:${{ env.VERSION }}
          platforms: linux/amd64
          cache-from: type=registry,ref=deattorsss/sun-panel-dea:buildcache
          cache-to: type=registry,ref=deattorsss/sun-panel-dea:buildcache,mode=max

      - name: Update Docker Hub Description
        uses: peter-evans/dockerhub-description@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: deattorsss/sun-panel-dea

      - name: Post build status to GitHub Check
        if: always()
        run: |
          echo "Build completed. Image: deattorsss/sun-panel-dea:latest"